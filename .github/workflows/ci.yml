name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust:
    name: Rust — check, clippy, test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: cargo check
      run: cargo check --workspace

    - name: cargo clippy
      run: cargo clippy --workspace -- -D warnings

    - name: cargo test
      run: cargo test --workspace

  wasm-build:
    name: WASM build
    runs-on: ubuntu-latest
    needs: rust
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

    - name: Install binaryen (wasm-opt)
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y binaryen

    - name: wasm-pack build
      run: wasm-pack build crates/widescope-core --target web --out-dir pkg

    - name: wasm-opt post-optimise
      run: |
        wasm-opt \
          --enable-bulk-memory \
          --enable-reference-types \
          --enable-mutable-globals \
          --enable-nontrapping-float-to-int \
          --enable-sign-ext \
          -O4 \
          -o crates/widescope-core/pkg/widescope_core_bg.wasm \
          crates/widescope-core/pkg/widescope_core_bg.wasm
        echo "Optimised WASM size: $(du -sh crates/widescope-core/pkg/widescope_core_bg.wasm)"

    - name: Upload WASM pkg
      uses: actions/upload-artifact@v4
      with:
        name: wasm-pkg
        path: crates/widescope-core/pkg/

  ui-build:
    name: UI build
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
    - uses: actions/checkout@v4

    - name: Download WASM pkg
      uses: actions/download-artifact@v4
      with:
        name: wasm-pkg
        path: crates/widescope-core/pkg/

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Install UI dependencies
      run: npm ci
      working-directory: ui

    - name: Build UI
      run: npm run build
      working-directory: ui

    - name: Upload dist
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: ui/dist/
